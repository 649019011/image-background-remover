<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Remove image backgrounds instantly using AI">
    <title>AI Background Remover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 AI Background Remover</h1>
            <p>Remove background from any image in seconds</p>
        </header>

        <main>
            <div id="upload-section" class="upload-section">
                <div class="drop-zone" id="drop-zone">
                    <div class="upload-icon">📁</div>
                    <h3>Drag & Drop your image here</h3>
                    <p>or click to browse</p>
                    <span class="hint">Supports JPG, PNG, WebP (Max 10MB)</span>
                    <input type="file" id="file-input" accept="image/*" hidden>
                </div>
            </div>

            <div id="processing-section" class="processing-section hidden">
                <div class="image-preview-container">
                    <div class="image-card">
                        <h3>Original</h3>
                        <img id="original-image" alt="Original">
                    </div>
                    <div class="image-card">
                        <h3>Result</h3>
                        <div id="result-placeholder">
                            <p>Click "Remove Background" to process</p>
                        </div>
                        <img id="result-image" class="hidden" alt="Result">
                    </div>
                </div>

                <div class="button-container">
                    <button id="process-btn" class="btn btn-primary">
                        ✨ Remove Background
                    </button>
                    <button id="download-btn" class="btn btn-success hidden">
                        ⬇️ Download PNG
                    </button>
                    <button id="reset-btn" class="btn btn-secondary">
                        🔄 New Image
                    </button>
                </div>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Processing your image...</p>
            </div>

            <div id="error-message" class="error-message hidden"></div>
        </main>

        <footer>
            <p>Powered by AI • No data is stored on our servers</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
